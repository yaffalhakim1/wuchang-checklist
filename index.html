<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wuchang: Fallen Feathers — Journey Scroll</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #1a1208;
        --parchment: #f5ecd7;
        --parchment2: #ede0c4;
        --gold: #c9923a;
        --muted: #6b5c3e;
        --done-bg: #2a3d1e;
        --done-text: #7ab648;
        --red-ink: #8b1a1a;
        --warn-bg: #2a1800;
        --warn-text: #e8a84c;
        --warn-border: #6b3a00;
        --info-bg: #001a2a;
        --info-text: #7ab8e8;
        --info-border: #004060;
      }
      body {
        background: #2a1f0e;
        font-family: "Crimson Text", serif;
        color: var(--ink);
        min-height: 100vh;
        padding: 1rem 1rem 4rem;
      }
      .app {
        max-width: 800px;
        margin: 0 auto;
        background: var(--parchment);
        border-radius: 12px;
        border: 1px solid #c9923a60;
        padding-bottom: 2rem;
      }
      .header {
        text-align: center;
        padding: 1.75rem 1rem 1.25rem;
      }
      .header::before,
      .header::after {
        content: "";
        display: block;
        width: 80%;
        margin: 0 auto;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
      }
      .header::before {
        margin-bottom: 1rem;
      }
      .header::after {
        margin-top: 1rem;
      }
      .game-title {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.35em;
        color: var(--gold);
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .main-title {
        font-family: "Cinzel", serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--ink);
      }
      .subtitle {
        font-size: 14px;
        color: var(--muted);
        font-style: italic;
        margin-top: 3px;
      }
      .tab-bar {
        display: flex;
        padding: 0 1rem;
        border-bottom: 1px solid #c9923a40;
        margin-top: 0.5rem;
      }
      .tab-btn {
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.08em;
        padding: 8px 16px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition:
          color 0.15s,
          border-color 0.15s;
        white-space: nowrap;
      }
      .tab-btn.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
      }
      .tab-btn:hover:not(.active) {
        color: var(--ink);
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      .progress-wrap {
        padding: 1rem 1.25rem 0.5rem;
      }
      .progress-labels {
        display: flex;
        justify-content: space-between;
        font-family: "Cinzel", serif;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .progress-count {
        color: var(--gold);
        font-size: 13px;
        font-weight: 600;
      }
      .progress-track {
        height: 5px;
        background: var(--parchment2);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--red-ink), var(--gold));
        border-radius: 3px;
        transition: width 0.4s ease;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0.5rem 1.25rem 0;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-family: "Cinzel", serif;
        color: var(--muted);
      }
      .legend-dot {
        width: 7px;
        height: 7px;
        border-radius: 2px;
      }
      .parts-container {
        padding: 0.75rem 1rem 0;
      }
      .part-card {
        background: var(--parchment);
        border: 0.5px solid #c9923a50;
        border-radius: 8px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .part-card.all-done {
        border-color: var(--done-text);
        opacity: 0.82;
      }
      .part-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        cursor: pointer;
        user-select: none;
        background: var(--parchment2);
        border-bottom: 0.5px solid transparent;
        transition: background 0.15s;
      }
      .part-header:hover {
        background: #e8d9b8;
      }
      .part-header.open {
        border-bottom-color: #c9923a30;
      }
      .part-num {
        font-family: "Cinzel", serif;
        font-size: 9px;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.1em;
        min-width: 50px;
      }
      .part-name {
        font-family: "Cinzel", serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        flex: 1;
        line-height: 1.3;
      }
      .part-badge {
        font-size: 11px;
        font-family: "Cinzel", serif;
        color: var(--muted);
        white-space: nowrap;
      }
      .part-badge.done-badge {
        color: var(--done-text);
        font-weight: 600;
      }
      .chevron {
        width: 13px;
        height: 13px;
        fill: none;
        stroke: var(--muted);
        stroke-width: 2;
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .chevron.open {
        transform: rotate(180deg);
      }
      .part-body {
        display: none;
        padding: 6px 12px 10px;
      }
      .part-body.open {
        display: block;
      }
      .task-row {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding: 6px 4px;
        border-bottom: 0.5px solid #c9923a20;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.12s;
      }
      .task-row:last-child {
        border-bottom: none;
      }
      .task-row:hover {
        background: #e8d9b815;
      }
      .task-check {
        width: 15px;
        height: 15px;
        border: 1.5px solid var(--gold);
        border-radius: 3px;
        flex-shrink: 0;
        margin-top: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.12s,
          border-color 0.12s;
      }
      .task-row.checked .task-check {
        background: var(--done-bg);
        border-color: var(--done-text);
      }
      .checkmark {
        width: 8px;
        height: 8px;
        fill: none;
        stroke: var(--done-text);
        stroke-width: 2.5;
        display: none;
      }
      .task-row.checked .checkmark {
        display: block;
      }
      .task-label {
        font-size: 14px;
        color: var(--ink);
        line-height: 1.5;
        flex: 1;
        word-break: break-word;
      }
      .task-row.checked .task-label {
        color: var(--muted);
        text-decoration: line-through;
        text-decoration-color: var(--muted);
      }
      .task-tag {
        font-size: 9px;
        font-family: "Cinzel", serif;
        padding: 2px 6px;
        border-radius: 10px;
        white-space: nowrap;
        margin-top: 3px;
        flex-shrink: 0;
      }
      .tag-boss {
        background: #4a0a0a;
        color: #e8a0a0;
        border: 0.5px solid #8b1a1a;
      }
      .tag-optional {
        background: #2a2200;
        color: #c9a84c;
        border: 0.5px solid #6b5000;
      }
      .tag-shrine {
        background: #1a2a00;
        color: #7ab648;
        border: 0.5px solid #3a5000;
      }
      .tag-key {
        background: #0a1a2a;
        color: #7ab8e8;
        border: 0.5px solid #1a4060;
      }
      .tag-npc {
        background: #2a0a2a;
        color: #c8a0e8;
        border: 0.5px solid #6a3a6a;
      }
      .ach-section-label {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.15em;
        color: var(--gold);
        text-transform: uppercase;
        padding: 1rem 1.25rem 0.4rem;
        border-bottom: 0.5px solid #c9923a30;
      }
      .ach-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 1.25rem;
        border-bottom: 0.5px solid #c9923a20;
        cursor: pointer;
        transition: background 0.12s;
      }
      .ach-item:hover {
        background: #ede0c450;
      }
      .ach-item:last-child {
        border-bottom: none;
      }
      .ach-check {
        width: 17px;
        height: 17px;
        border: 1.5px solid var(--gold);
        border-radius: 3px;
        flex-shrink: 0;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.12s,
          border-color 0.12s;
      }
      .ach-item.checked .ach-check {
        background: var(--done-bg);
        border-color: var(--done-text);
      }
      .ach-checkmark {
        width: 9px;
        height: 9px;
        fill: none;
        stroke: var(--done-text);
        stroke-width: 2.5;
        display: none;
      }
      .ach-item.checked .ach-checkmark {
        display: block;
      }
      .ach-content {
        flex: 1;
      }
      .ach-name {
        font-family: "Cinzel", serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.3;
      }
      .ach-item.checked .ach-name {
        color: var(--muted);
        text-decoration: line-through;
      }
      .ach-desc {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
        margin-top: 2px;
      }
      .ach-req {
        font-size: 12px;
        margin-top: 5px;
        padding: 5px 8px;
        border-left: 2px solid var(--warn-border);
        background: var(--warn-bg);
        color: var(--warn-text);
        line-height: 1.4;
      }
      .ach-req.info {
        border-left-color: var(--info-border);
        background: var(--info-bg);
        color: var(--info-text);
      }
      .ach-tier {
        font-size: 9px;
        font-family: "Cinzel", serif;
        padding: 2px 7px;
        border-radius: 10px;
        white-space: nowrap;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .tier-gold {
        background: #2a1800;
        color: #e8b86d;
        border: 0.5px solid #6b4000;
      }
      .tier-silver {
        background: #1a1a2a;
        color: #a0b8e8;
        border: 0.5px solid #3a4060;
      }
      .tier-bronze {
        background: #1a1000;
        color: #c8844c;
        border: 0.5px solid #5a3000;
      }
      .tier-platinum {
        background: #2a0a2a;
        color: #c8a0e8;
        border: 0.5px solid #6a3a6a;
      }
      .ending-card {
        margin: 0.75rem 1rem 0;
        border: 0.5px solid #c9923a50;
        border-radius: 8px;
        overflow: hidden;
      }
      .ending-card.highlight {
        border-color: var(--gold);
      }
      .ending-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: var(--parchment2);
        cursor: pointer;
        user-select: none;
      }
      .ending-name {
        font-family: "Cinzel", serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        flex: 1;
      }
      .ending-badge {
        font-size: 9px;
        font-family: "Cinzel", serif;
        padding: 2px 8px;
        border-radius: 10px;
        white-space: nowrap;
      }
      .badge-bad {
        background: #4a0a0a;
        color: #e8a0a0;
        border: 0.5px solid #8b1a1a;
      }
      .badge-good {
        background: #1a2a00;
        color: #7ab648;
        border: 0.5px solid #3a5000;
      }
      .badge-true {
        background: #0a1a2a;
        color: #7ab8e8;
        border: 0.5px solid #1a4060;
      }
      .badge-secret {
        background: #2a2200;
        color: #c9a84c;
        border: 0.5px solid #6b5000;
      }
      .badge-yours {
        background: #2a0a2a;
        color: #e88080;
        font-style: italic;
      }
      .ending-body {
        display: none;
        padding: 10px 12px 12px;
      }
      .ending-body.open {
        display: block;
      }
      .ending-lore {
        font-size: 14px;
        color: var(--ink);
        line-height: 1.55;
        margin-bottom: 8px;
        font-style: italic;
      }
      .npc-block {
        margin-top: 6px;
        padding: 6px 10px;
        background: var(--info-bg);
        border-left: 2px solid var(--info-border);
        color: var(--info-text);
        font-size: 12px;
        line-height: 1.5;
      }
      .ending-steps {
        list-style: none;
        margin-top: 8px;
      }
      .ending-steps li {
        font-size: 13px;
        color: var(--muted);
        padding: 4px 0 4px 16px;
        position: relative;
        line-height: 1.45;
        border-bottom: 0.5px solid #c9923a15;
      }
      .ending-steps li:last-child {
        border-bottom: none;
      }
      .ending-steps li::before {
        content: "";
        position: absolute;
        left: 4px;
        top: 11px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--gold);
      }
      .ending-steps li.warn {
        color: var(--warn-text);
      }
      .ending-steps li.warn::before {
        background: var(--warn-text);
      }
      .quest-loc {
        font-size: 11px;
        color: var(--gold);
        font-family: "Cinzel", serif;
        display: block;
        margin-bottom: 2px;
      }
      .reset-btn {
        display: block;
        margin: 1.5rem auto 0;
        background: transparent;
        border: 0.5px solid var(--gold);
        color: var(--gold);
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 0.2em;
        padding: 6px 20px;
        border-radius: 4px;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .reset-btn:hover {
        background: var(--gold);
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="game-title">Wuchang: Fallen Feathers</div>
        <div class="main-title">Journey Scroll</div>
        <div class="subtitle">Walkthrough · Questlines · Achievements · Endings</div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('walkthrough')">
          Area Walkthrough
        </button>
        <button class="tab-btn" onclick="switchTab('achievements')">
          Achievements
        </button>
        <button class="tab-btn" onclick="switchTab('questlines')">NPC Questlines</button>
        <button class="tab-btn" onclick="switchTab('endings')">Endings</button>
      </div>

      <div id="tab-walkthrough" class="tab-panel active">
        <div class="progress-wrap">
          <div class="progress-labels">
            <span>Journey Progress</span
            ><span class="progress-count" id="walk-count">0 / 0</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="walk-fill" style="width: 0%"></div>
          </div>
        </div>
        <div class="legend">
          <span class="legend-item"
            ><span
              class="legend-dot"
              style="background: #4a0a0a; border: 0.5px solid #8b1a1a"
            ></span
            >Boss</span
          >
          <span class="legend-item"
            ><span
              class="legend-dot"
              style="background: #2a2200; border: 0.5px solid #6b5000"
            ></span
            >Optional</span
          >
          <span class="legend-item"
            ><span
              class="legend-dot"
              style="background: #1a2a00; border: 0.5px solid #3a5000"
            ></span
            >Shrine</span
          >
          <span class="legend-item"
            ><span
              class="legend-dot"
              style="background: #0a1a2a; border: 0.5px solid #1a4060"
            ></span
            >Key Item</span
          >
          <span class="legend-item"
            ><span
              class="legend-dot"
              style="background: #2a0a2a; border: 0.5px solid #6a3a6a"
            ></span
            >NPC Quest</span
          >
        </div>
        <div class="parts-container" id="parts-container"></div>
        <button class="reset-btn" onclick="resetWalkthrough()">
          ⟲ Reset Walkthrough
        </button>
      </div>

      <div id="tab-achievements" class="tab-panel">
        <div class="progress-wrap">
          <div class="progress-labels">
            <span>Achievement Progress</span
            ><span class="progress-count" id="ach-count">0 / 0</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="ach-fill" style="width: 0%"></div>
          </div>
        </div>
        <div id="ach-container"></div>
        <button class="reset-btn" onclick="resetAchievements()">
          ⟲ Reset Achievements
        </button>
      </div>

      <div id="tab-questlines" class="tab-panel">
        <div class="progress-wrap">
          <div class="progress-labels">
            <span>Total Quest Steps</span
            ><span class="progress-count" id="quest-count">0 / 0</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="quest-fill" style="width: 0%"></div>
          </div>
        </div>
        <div class="parts-container" id="quest-container"></div>
        <button class="reset-btn" onclick="resetQuests()">⟲ Reset Quests</button>
      </div>

      <div id="tab-endings" class="tab-panel">
        <div id="endings-container"></div>
      </div>
    </div>

    <script>
      const WALK_KEY = "wuchang_walk_v2",
        ACH_KEY = "wuchang_ach_v2",
        QUEST_KEY = "wuchang_quests_v1";
      function loadS(k) {
        try {
          return JSON.parse(localStorage.getItem(k)) || {};
        } catch {
          return {};
        }
      }
      function saveS(k, s) {
        try {
          localStorage.setItem(k, JSON.stringify(s));
        } catch {}
      }
      let walkState = loadS(WALK_KEY),
        achState = loadS(ACH_KEY),
        questState = loadS(QUEST_KEY),
        openParts = {};

      const PARTS = [
        {
          id: "p1",
          num: "Part I",
          name: "Worship's Rise — Critical Path",
          tasks: [
            {
              id: "t1",
              label:
                "Start in the cave, follow the only path forward to Revenant Temple. Claim the Shrine outside the front door on the lower level.",
              tag: "shrine",
            },
            {
              id: "tn_ql1",
              label:
                "⚑ Red-Clad Lady — Initial meeting; speak with her in the temple courtyard.",
              tag: "npc",
            },
            {
              id: "t2",
              label:
                "In the courtyard, go through the gateway to the right. Follow the path until you reach the Buddha Cliffs Shrine.",
              tag: "shrine",
            },
            {
              id: "t3",
              label:
                "Continue past Buddha Cliffs to reach Lightzen Temple and claim the shrine there.",
              tag: "shrine",
            },
            {
              id: "t4",
              label:
                "Boss fight at Lightzen Temple: defeat Master Raider — Man-Eating Dhutanga. Pick up the Lightzen key.",
              tag: "boss",
            },
            {
              id: "t5",
              label:
                "Use the Lightzen key to progress forward into a village. Navigate through until you reach Shu Sanctum.",
              tag: "key",
            },
            {
              id: "t6",
              label: "Claim the Shu Sanctum Shrine on the ground floor.",
              tag: "shrine",
            },
            {
              id: "tn_qe1",
              label:
                "⚑ White-Robed Elder — Find him on the 2nd-floor balcony. Receive Plumed Branch.",
              tag: "npc",
            },
            {
              id: "t7",
              label:
                "Head upstairs and defeat the Feathered Priest — Lu Bingchang. Collect his key. After defeating him, talk to NPCs in tents at Revenant Temple (missable Faint Red Feather).",
              tag: "boss",
            },
            {
              id: "t8",
              label:
                "(Optional) Cross the fallen tree on the 2nd floor, hang immediate left, go up the hill, open the doors. Defeat Gluttonous Monstrosity — Lu Hongliu.",
              tag: "optional",
            },
            {
              id: "t9",
              label:
                "Use the Feathered Priest's key to rotate the Shu Sanctum floor, revealing a basement. Head down to the Mercury Workshop.",
              tag: "key",
            },
            {
              id: "t10",
              label:
                "Claim the Mercury Workshop Shrine. Use lifts as shortcuts before navigating down to the Bandit Cave Shrine.",
              tag: "shrine",
            },
            {
              id: "t11",
              label:
                "Just beyond Bandit Cave: defeat Blightweaver — Great Centipede. You'll be spat out into Doomwillow Beach.",
              tag: "boss",
            },
            {
              id: "tn_ql2",
              label:
                "⚑ Red-Clad Lady — Talk to her after the Great Centipede fight.",
              tag: "npc",
            },
            {
              id: "t12",
              label:
                "The Doomwillow Beach Shrine is a Mimic — it attacks on interaction. Defeat it, then unlock the real shrine.",
              tag: "shrine",
            },
            {
              id: "tn_qe2",
              label:
                "⚑ White-Robed Elder — Talk to him near the shrine (take the uphill path slightly to the right).",
              tag: "npc",
            },
            {
              id: "t13",
              label:
                "Mostly linear area. Watch for surprise attacks.",
              tag: null,
            },
            {
              id: "t14",
              label:
                "Reach and defeat Reborn Treant — Soulwood. This earns you the Corpse Pits Shrine.",
              tag: "boss",
            },
            {

      function getTagHtml(tag) {
        if (!tag) return "";
        const l = {
          boss: "Boss",
          optional: "Optional",
          shrine: "Shrine",
          key: "Key Item",
          npc: "NPC Quest",
        };
        return `<span class="task-tag tag-${tag}">${l[tag]}</span>`;
      }

      function updateWalkProgress() {
        const all = PARTS.flatMap((p) => p.tasks.map((t) => t.id));
        const done = all.filter((id) => walkState[id]).length;
        document.getElementById("walk-count").textContent =
          `${done} / ${all.length}`;
        document.getElementById("walk-fill").style.width =
          `${all.length ? Math.round((done / all.length) * 100) : 0}%`;
        PARTS.forEach((part) => {
          const card = document.getElementById("card-" + part.id);
          if (!card) return;
          const pd = part.tasks.filter((t) => walkState[t.id]).length;
          const badge = card.querySelector(".part-badge");
          if (pd === part.tasks.length) {
            card.classList.add("all-done");
            badge.textContent = "✓ Complete";
            badge.className = "part-badge done-badge";
          } else {
            card.classList.remove("all-done");
            badge.textContent = `${pd}/${part.tasks.length}`;
            badge.className = "part-badge";
          }
        });
      }

      function toggleWalkTask(id, el) {
        walkState[id] = !walkState[id];
        saveS(WALK_KEY, walkState);
        el.classList.toggle("checked", walkState[id]);
        updateWalkProgress();
        // Sync NPC tasks to questlines tab
        if (id.startsWith("tn_")) {
          const questId = id.slice(3);
          questState[questId] = walkState[id];
          saveS(QUEST_KEY, questState);
          renderQuests();
        }
      }
      function togglePart(id) {
        openParts[id] = !openParts[id];
        document.getElementById("body-" + id).className = openParts[id]
          ? "part-body open"
          : "part-body";
        document.getElementById("header-" + id).className = openParts[id]
          ? "part-header open"
          : "part-header";
        document.getElementById("chev-" + id).className = openParts[id]
          ? "chevron open"
          : "chevron";
      }

      function renderWalkthrough() {
        const container = document.getElementById("parts-container");
        container.innerHTML = "";
        PARTS.forEach((part, i) => {
          if (i === 0) openParts[part.id] = true;
          const pd = part.tasks.filter((t) => walkState[t.id]).length;
          const isComplete = pd === part.tasks.length;
          const card = document.createElement("div");
          card.className = `part-card${isComplete ? " all-done" : ""}`;
          card.id = "card-" + part.id;
          const header = document.createElement("div");
          header.className = openParts[part.id]
            ? "part-header open"
            : "part-header";
          header.id = "header-" + part.id;
          header.onclick = () => togglePart(part.id);
          header.innerHTML = `<span class="part-num">${part.num}</span><span class="part-name">${part.name}</span><span class="part-badge ${isComplete ? "done-badge" : ""}">${isComplete ? "✓ Complete" : `${pd}/${part.tasks.length}`}</span><svg id="chev-${part.id}" class="chevron ${openParts[part.id] ? "open" : ""}" viewBox="0 0 16 16"><polyline points="3,6 8,11 13,6"/></svg>`;
          const body = document.createElement("div");
          body.className = openParts[part.id] ? "part-body open" : "part-body";
          body.id = "body-" + part.id;
          part.tasks.forEach((task) => {
            const row = document.createElement("div");
            row.className = `task-row${walkState[task.id] ? " checked" : ""}`;
            row.innerHTML = `<div class="task-check"><svg class="checkmark" viewBox="0 0 10 10"><polyline points="1.5,5.5 4,8 8.5,2"/></svg></div><span class="task-label">${task.label}</span>${getTagHtml(task.tag)}`;
            row.onclick = () => toggleWalkTask(task.id, row);
            body.appendChild(row);
          });
          card.appendChild(header);
          card.appendChild(body);
          container.appendChild(card);
        });
        updateWalkProgress();
      }
      function resetWalkthrough() {
        if (!confirm("Reset all walkthrough progress?")) return;
        walkState = {};
        saveS(WALK_KEY, walkState);
        renderWalkthrough();
      }

      function updateQuestProgress() {
        const all = QUESTS.flatMap((q) => q.tasks.map((t) => t.id));
        const done = all.filter((id) => questState[id]).length;
        document.getElementById("quest-count").textContent = `${done} / ${all.length}`;
        document.getElementById("quest-fill").style.width = `${all.length ? Math.round((done / all.length) * 100) : 0}%`;
      }

      function toggleQuestStep(id, el) {
        questState[id] = !questState[id];
        saveS(QUEST_KEY, questState);
        el.classList.toggle("checked", questState[id]);
        updateQuestProgress();
        // Sync to walkthrough tab
        const walkId = "tn_" + id;
        walkState[walkId] = questState[id];
        saveS(WALK_KEY, walkState);
        renderWalkthrough();
      }

      function renderQuests() {
        const container = document.getElementById("quest-container");
        container.innerHTML = "";
        QUESTS.forEach((quest) => {
          const card = document.createElement("div");
          card.className = "part-card";
          card.innerHTML = `<div class="part-header" onclick="this.nextElementSibling.classList.toggle('open')"><span class="part-name">${quest.name}</span></div>`;
          const body = document.createElement("div");
          body.className = "part-body open";
          quest.tasks.forEach((task) => {
            const row = document.createElement("div");
            row.className = `task-row${questState[task.id] ? " checked" : ""}`;
            row.innerHTML = `<div class="task-check"><svg class="checkmark" viewBox="0 0 10 10"><polyline points="1.5,5.5 4,8 8.5,2"/></svg></div><div class="task-label"><span class="quest-loc">${task.loc}</span>${task.label}</div>`;
            row.onclick = () => toggleQuestStep(task.id, row);
            body.appendChild(row);
          });
          card.appendChild(body);
          container.appendChild(card);
        });
        updateQuestProgress();
      }

      function resetQuests() {
        if (!confirm("Reset all quest progress?")) return;
        questState = {};
        saveS(QUEST_KEY, questState);
        renderQuests();
      }

      renderWalkthrough();
      renderAchievements();
      renderEndings();
      renderQuests();

      // Initial sync: align questState with walkState for NPC tasks
      (function syncInitial() {
        let changed = false;
        PARTS.forEach((p) => p.tasks.forEach((t) => {
          if (t.id.startsWith("tn_")) {
            const qid = t.id.slice(3);
            if (walkState[t.id] && !questState[qid]) {
              questState[qid] = true; changed = true;
            } else if (!walkState[t.id] && questState[qid]) {
              walkState[t.id] = true; changed = true;
            }
          }
        }));
        if (changed) {
          saveS(WALK_KEY, walkState);
          saveS(QUEST_KEY, questState);
          renderWalkthrough();
          renderQuests();
        }
      })();

      if (!achState["a_jar"]) {
        achState["a_jar"] = true;
        saveS(ACH_KEY, achState);
        const el = document.getElementById("ach-a_jar");
        if (el) el.classList.add("checked");
        updateAchProgress();
      }
    </script>
  </body>
</html>
